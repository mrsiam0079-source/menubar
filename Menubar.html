<!doctype html>

<html>
    
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;700&display=swap" rel="stylesheet" />

    <style>
        /* ০. গ্যাপে সবুজ কালার দেখানোর জন্য বডি সেটআপ */
        body {
            margin: 0;
            padding: 0;
            background-color: #006a4e; /* গ্যাপের সবুজ কালার */
            font-family: 'Hind Siliguri', sans-serif;
        }

        /* ১. মেইন মেনুবার কন্টেইনার (সব ডিভাইসে ৫px গ্যাপ) */
        #custom-nav-wrapper {
            background-color: #006a4e; 
            width: auto;           /* ১০০% এর বদলে auto দিলে মার্জিন ঠিক থাকে */
            margin: 0 5px;         /* উপরে-নিচে ০, ডানে-বামে ৫ পিক্সেল গ্যাপ */
            position: relative;
            box-sizing: border-box;
            z-index: 1000;
        }

        /* ডেক্সটপ মেনু স্টাইল */
        .main-nav {
            list-style: none;
            display: flex;
            justify-content: space-between;
            margin: 0; 
            padding: 0; 
            width: 100%;
        }

        .main-nav > li { flex: 1; position: relative; text-align: center; }

        .main-nav li a {
            display: block; 
            color: #ffffff; 
            padding: 15px 5px;
            text-decoration: none; 
            font-size: 14px; 
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .main-nav li:hover > a { background-color: #008450; color: #ffff00; }

        /* সাব-মেনু এনিমেশন ও পজিশন */
        .submenu, .over-submenu, .deep-submenu {
            visibility: hidden; 
            opacity: 0; 
            position: absolute;
            background-color: #006a4e; 
            min-width: 220px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.3); 
            z-index: 9999;
            text-align: left; 
            border-top: 2px solid #ffff00;
            transform: translateY(15px); 
            transition: all 0.4s ease;
            list-style: none; 
            padding: 0; 
            margin: 0;
        }

        .submenu { top: 100%; left: 0; }
        .over-submenu { top: 0; left: 100%; transform: translateX(15px); }
        .deep-submenu { top: 0; left: 100%; transform: translateX(15px); }

        .main-nav li:hover > .submenu, 
        .submenu li:hover > .over-submenu,
        .over-submenu li:hover > .deep-submenu {
            visibility: visible; 
            opacity: 1; 
            transform: translateY(0) translateX(0);
        }

        .submenu li a, .over-submenu li a, .deep-submenu li a { 
            padding: 12px 15px; 
            font-size: 13px; 
            color: white; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }

        .submenu li:hover > a, .over-submenu li:hover > a, .deep-submenu li:hover > a { 
            background-color: #008450; color: #ffff00; padding-left: 20px; 
        }

        .arrow-icon { transition: transform 0.3s; font-size: 11px; margin-left: 5px; }

        /* ২. মোবাইল ও ট্যাব ভার্সন */
        .mobile-header { display: none; }

        @media (max-width: 1024px) {
            #custom-nav-wrapper { margin: 0 5px; width: auto; } /* ট্যাব ও মোবাইলে গ্যাপ নিশ্চিত */
            
            .mobile-header {
                display: flex; 
                background-color: #006a4e; 
                padding: 12px 15px;
                justify-content: space-between; 
                border-bottom: 3px solid #f42a41; 
                cursor: pointer;
            }
            .menu-label { color: white; font-weight: bold; font-size: 18px; display: flex; align-items: center; gap: 8px; }

            .main-nav {
                display: none; 
                flex-direction: column; 
                width: 100%;
                background-color: #28a745; /* মোবাইল মেনু ব্যাকগ্রাউন্ড */
                list-style: none;
            }
            .main-nav.active { display: flex; animation: slideDown 0.4s ease; }

            @keyframes slideDown {
                from { opacity: 0; transform: translateY(-10px); }
                to { opacity: 1; transform: translateY(0); }
            }

            .main-nav li a { padding: 15px 20px; font-size: 16px; justify-content: space-between; text-align: left; }

            .submenu, .over-submenu, .deep-submenu {
                position: static; 
                visibility: visible; 
                opacity: 1; 
                display: none;
                background-color: #218838; 
                padding-left: 15px; 
                list-style: none; 
                transform: none; 
                box-shadow: none; 
                border-top: none;
            }

            .main-nav li.open > .submenu, 
            .submenu li.open > .over-submenu,
            .over-submenu li.open > .deep-submenu { display: block; animation: slideDown 0.3s ease; }
            
            .main-nav li.open > a > .arrow-icon { transform: rotate(180deg); }
            .desktop-home { display: none; }
        }
    </style>



<nav id="custom-nav-wrapper">
    <div class="mobile-header" onclick="toggleMenu()">
        <a href="/" style="color:white; text-decoration:none; font-weight:bold;"><i class="fa fa-home"></i> Home</a>
        <div class="menu-label">MENU <i class="fa fa-bars"></i></div>
    </div>

    <ul class="main-nav" id="mainNav">
        <li class="desktop-home"><a href="/"><i class="fa fa-home"></i> Home</a></li>

        <li>
            <a href="javascript:void(0)" class="mobile-trigger">Documents <i class="fa fa-chevron-down arrow-icon"></i></a>
            <ul class="submenu">
                <li>
                    <a href="javascript:void(0)" class="mobile-trigger">Policy <i class="fa fa-chevron-right arrow-icon"></i></a>
                    <ul class="over-submenu">
                        <li>
                            <a href="javascript:void(0)" class="mobile-trigger">Rules <i class="fa fa-chevron-right arrow-icon"></i></a>
                            <ul class="deep-submenu">
                                <li><a href="#">Official Rule</a></li>
                                <li><a href="#">User Rule</a></li>
                            </ul>
                        </li>
                        <li><a href="#">Privacy</a></li>
                    </ul>
                </li>
                <li><a href="#">Reports</a></li>
            </ul>
        </li>

        <li>
            <a href="javascript:void(0)" class="mobile-trigger">Software <i class="fa fa-chevron-down arrow-icon"></i></a>
            <ul class="submenu">
                <li>
                    <a href="javascript:void(0)" class="mobile-trigger">Apps <i class="fa fa-chevron-right arrow-icon"></i></a>
                    <ul class="over-submenu">
                        <li><a href="#">Desktop</a></li>
                        <li><a href="#">Android</a></li>
                    </ul>
                </li>
            </ul>
        </li>

        <li>
            <a href="javascript:void(0)" class="mobile-trigger">Results <i class="fa fa-chevron-down arrow-icon"></i></a>
            <ul class="submenu">
                <li>
                    <a href="javascript:void(0)" class="mobile-trigger">Board <i class="fa fa-chevron-right arrow-icon"></i></a>
                    <ul class="over-submenu">
                        <li><a href="#">HSC Result</a></li>
                        <li><a href="#">SSC Result</a></li>
                    </ul>
                </li>
            </ul>
        </li>

        <li><a href="#">Contact</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#"><i class="fa fa-lock"></i> Admin Login</a></li>
    </ul>
</nav>

<script>
    // মোবাইল মেনু ওপেন/ক্লোজ
    function toggleMenu() {
        document.getElementById("mainNav").classList.toggle("active");
    }

    // মোবাইল সাব-মেনু ক্লিক লজিক
    document.querySelectorAll('.mobile-trigger').forEach(item => {
        item.addEventListener('click', function(e) {
            if(window.innerWidth < 1025) {
                e.preventDefault();
                this.parentElement.classList.toggle('open');
            }
        });
    });

    // মেনুর বাইরে ক্লিক করলে বন্ধ হবে
    window.addEventListener('click', function(e) {
        if (!document.getElementById('custom-nav-wrapper').contains(e.target)) {
            document.getElementById('mainNav').classList.remove('active');
        }
    });
</script>


</html>
